<div class="canary-toggle-container">
  <label class="canary-toggle-label">
    <input
      type="checkbox"
      id="canary-toggle"
      [checked]="canaryMode"
      (change)="onCanaryToggleChange($event)"
    />
    <span>Canary Mode</span>
  </label>
</div>

<div id="sdk-root"></div>
<button (click)="onPayClick()">Pay now</button>
